<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vibe-cs101 · 个人计算机基础学习智能体</title>
<style>
  :root {
    --bg: #f6f7fb; --card: #fff; --ink: #1f2430; --muted: #6b7280;
    --brand: #4f46e5; --brand-soft: #eef2ff; --ok: #059669; --warn: #d97706;
    --border: #e5e7eb; --code-bg: #f3f4f6;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
         background: var(--bg); color: var(--ink); }
  header { background: var(--card); border-bottom: 1px solid var(--border);
           padding: 14px 22px; display: flex; align-items: baseline; gap: 14px; }
  header h1 { font-size: 18px; margin: 0; }
  header .sub { color: var(--muted); font-size: 13px; }
  header .right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  nav { display: flex; gap: 4px; background: var(--card); padding: 0 16px;
        border-bottom: 1px solid var(--border); }
  nav button { border: 0; background: none; padding: 11px 16px; font-size: 14px;
               cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; }
  nav button.active { color: var(--brand); border-bottom-color: var(--brand); font-weight: 600; }
  main { max-width: 900px; margin: 0 auto; padding: 18px; }
  .panel { display: none; }
  .panel.active { display: block; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px;
          padding: 16px; margin-bottom: 14px; }
  input, select, textarea { font: inherit; padding: 8px 10px; border: 1px solid var(--border);
          border-radius: 8px; background: var(--card); color: var(--ink); }
  input:focus, textarea:focus { outline: 2px solid var(--brand-soft); border-color: var(--brand); }
  button.primary { background: var(--brand); color: #fff; border: 0; border-radius: 8px;
          padding: 9px 16px; font: inherit; cursor: pointer; }
  button.primary:disabled { opacity: .5; cursor: default; }
  button.ghost { background: none; border: 1px solid var(--border); border-radius: 8px;
          padding: 5px 10px; font-size: 13px; cursor: pointer; color: var(--muted); }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .grow { flex: 1; min-width: 180px; }
  /* chat */
  #chat-log { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
  .msg { padding: 10px 14px; border-radius: 12px; max-width: 85%; white-space: pre-wrap;
         word-break: break-word; line-height: 1.55; }
  .msg.user { align-self: flex-end; background: var(--brand); color: #fff; }
  .msg.bot  { align-self: flex-start; background: var(--card); border: 1px solid var(--border); }
  .msg.bot code { background: var(--code-bg); padding: 1px 5px; border-radius: 4px; font-size: 13px; }
  .msg.bot pre { background: var(--code-bg); padding: 10px; border-radius: 8px; overflow-x: auto; }
  .msg.bot pre code { background: none; padding: 0; }
  .events { font-size: 12px; color: var(--muted); margin: 2px 0 0 4px; }
  /* search results */
  .hit { padding: 10px 4px; border-bottom: 1px solid var(--border); }
  .hit:last-child { border-bottom: 0; }
  .hit .title { font-weight: 600; cursor: pointer; color: var(--brand); }
  .hit .meta { font-size: 12px; color: var(--muted); margin: 2px 0; }
  .hit .snippet { font-size: 13px; color: var(--ink); }
  .hit mark { background: #fde68a; padding: 0 2px; }
  #section-view pre { white-space: pre-wrap; word-break: break-word; background: var(--code-bg);
          padding: 12px; border-radius: 8px; max-height: 60vh; overflow: auto; font-size: 13px; }
  /* mistakes */
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; font-size: 12px; }
  .tag { display: inline-block; background: var(--brand-soft); color: var(--brand);
         border-radius: 6px; padding: 1px 7px; font-size: 12px; margin-right: 4px; }
  .due { color: var(--warn); font-weight: 600; }
  .mastered { color: var(--ok); }
  .statgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
              gap: 12px; margin-bottom: 14px; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 10px;
          padding: 14px; text-align: center; }
  .stat .num { font-size: 26px; font-weight: 700; color: var(--brand); }
  .stat .lbl { font-size: 12px; color: var(--muted); }
  .bar { height: 8px; background: var(--brand-soft); border-radius: 4px; overflow: hidden; }
  .bar i { display: block; height: 100%; background: var(--brand); }
  .muted { color: var(--muted); font-size: 13px; }
  .error { color: #b91c1c; font-size: 13px; min-height: 18px; }
  dialog { border: 1px solid var(--border); border-radius: 12px; padding: 18px; max-width: 720px; width: 90%; }
  dialog.auth { max-width: 420px; }
  dialog::backdrop { background: rgba(0,0,0,.35); }
</style>
</head>
<body>
<header>
  <h1>🎓 Vibe-cs101</h1>
  <span class="sub">个人计算机基础学习智能体 · cs101 计算概论B / cs201 数据结构与算法B</span>
  <span class="right">
    <span class="sub" id="llm-status"></span>
    <span class="sub" id="user-status"></span>
    <button id="auth-switch" class="ghost" style="display:none">切换用户</button>
  </span>
</header>
<nav>
  <button data-tab="chat" class="active">💬 对话</button>
  <button data-tab="search">🔍 检索</button>
  <button data-tab="mistakes">📌 错题本</button>
  <button data-tab="stats">📈 学习进度</button>
</nav>
<main>

<section id="panel-chat" class="panel active">
  <div id="chat-log"></div>
  <div class="row">
    <input id="chat-input" class="grow" placeholder="问点什么，比如：单调栈是什么？OpenJudge 26977 怎么做？"
           autocomplete="off">
    <button id="chat-send" class="primary">发送</button>
  </div>
  <p class="muted">回答基于老师的课件与题解并注明出处；说「我做错了某题」可自动记入错题本。</p>
</section>

<section id="panel-search" class="panel">
  <div class="card">
    <div class="row">
      <input id="search-q" class="grow" placeholder="关键词，如：动态规划 / 接雨水 / dijkstra">
      <select id="search-course">
        <option value="">全部课程</option>
        <option value="cs101">cs101 计概</option>
        <option value="cs201">cs201 数算</option>
      </select>
      <button id="search-btn" class="primary">检索</button>
    </div>
  </div>
  <div class="card" id="search-results"><p class="muted">离线全文检索，无需 API key。</p></div>
</section>

<section id="panel-mistakes" class="panel">
  <div class="card">
    <div class="row">
      <select id="mi-view">
        <option value="all">全部错题</option>
        <option value="due">今日待复习</option>
      </select>
      <button id="mi-refresh" class="ghost">刷新</button>
      <span class="grow"></span>
      <button id="mi-add-btn" class="primary">＋ 记一道错题</button>
    </div>
  </div>
  <div class="card"><table id="mi-table">
    <thead><tr><th>#</th><th>题目</th><th>标签</th><th>原因</th><th>下次复习</th><th>操作</th></tr></thead>
    <tbody></tbody>
  </table></div>
</section>

<section id="panel-stats" class="panel">
  <div class="statgrid" id="stat-cards"></div>
  <div class="card"><h3 style="margin-top:0">薄弱知识点</h3><div id="stat-tags"></div></div>
  <div class="card"><h3 style="margin-top:0">按课程</h3><div id="stat-courses"></div></div>
</section>

</main>

<dialog id="section-dialog">
  <h3 id="section-title" style="margin-top:0"></h3>
  <p class="muted" id="section-meta"></p>
  <div id="section-view"><pre></pre></div>
  <div class="row" style="justify-content:flex-end"><button class="ghost" onclick="this.closest('dialog').close()">关闭</button></div>
</dialog>

<dialog id="mi-dialog">
  <h3 style="margin-top:0">记一道错题</h3>
  <div style="display:flex;flex-direction:column;gap:8px">
    <input id="mi-problem" placeholder="题目标识 *，如：OpenJudge 26977 接雨水">
    <div class="row">
      <select id="mi-course"><option value="">课程（可选）</option>
        <option value="cs101">cs101</option><option value="cs201">cs201</option></select>
      <input id="mi-tags" class="grow" placeholder="知识点标签，逗号分隔：dp,单调栈">
    </div>
    <input id="mi-reason" placeholder="错误原因：思路错 / 边界条件 / 超时…">
    <textarea id="mi-note" rows="3" placeholder="正确思路要点（可选）"></textarea>
  </div>
  <div class="row" style="justify-content:flex-end;margin-top:12px">
    <button class="ghost" onclick="this.closest('dialog').close()">取消</button>
    <button id="mi-save" class="primary">保存</button>
  </div>
</dialog>

<dialog id="auth-dialog" class="auth">
  <h3 style="margin-top:0">需要访问密钥</h3>
  <p class="muted">服务端已启用 Web UI 鉴权。请输入管理员分配的 API key。</p>
  <input id="auth-key" type="password" style="width:100%" placeholder="VIBE_CS101_AUTH_KEY">
  <p id="auth-error" class="error"></p>
  <div class="row" style="justify-content:flex-end;margin-top:12px">
    <button id="auth-save" class="primary">登录</button>
  </div>
</dialog>

<script>
const $ = s => document.querySelector(s);
const AUTH_STORE = 'vibe-cs101-auth-key';
let authKey = localStorage.getItem(AUTH_STORE) || '';
let currentUser = null;
let sessionId = null;

const api = async (path, opts = {}) => {
  const headers = {...(opts.headers || {})};
  if (authKey) headers.Authorization = `Bearer ${authKey}`;
  const r = await fetch(path, {...opts, headers});
  const data = await r.json().catch(() => ({}));
  if (r.status === 401) {
    localStorage.removeItem(AUTH_STORE);
    authKey = '';
    showAuth(data.error || '需要 API key');
  }
  if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
  return data;
};
const esc = s => s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function setUser(me) {
  currentUser = me.user;
  $('#user-status').textContent = me.auth_enabled ? `用户：${me.user}` : '本机模式';
  $('#auth-switch').style.display = me.auth_enabled ? '' : 'none';
}
function showAuth(message = '') {
  $('#auth-error').textContent = message;
  $('#auth-key').value = authKey;
  const d = $('#auth-dialog');
  if (!d.open) d.showModal();
  setTimeout(() => $('#auth-key').focus(), 0);
}
async function login() {
  const key = $('#auth-key').value.trim();
  if (!key) { $('#auth-error').textContent = 'API key 不能为空'; return; }
  authKey = key;
  try {
    const me = await api('/api/me');
    localStorage.setItem(AUTH_STORE, authKey);
    setUser(me);
    $('#auth-dialog').close();
    await loadInfo();
  } catch (e) {
    authKey = '';
    localStorage.removeItem(AUTH_STORE);
    $('#auth-error').textContent = e.message;
  }
}
$('#auth-save').onclick = login;
$('#auth-key').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
$('#auth-switch').onclick = () => {
  authKey = '';
  sessionId = null;
  currentUser = null;
  localStorage.removeItem(AUTH_STORE);
  showAuth('请输入新的 API key');
};

/* ---- tabs ---- */
document.querySelectorAll('nav button').forEach(b => b.onclick = () => {
  document.querySelectorAll('nav button').forEach(x => x.classList.toggle('active', x === b));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  $(`#panel-${b.dataset.tab}`).classList.add('active');
  if (b.dataset.tab === 'mistakes') loadMistakes();
  if (b.dataset.tab === 'stats') loadStats();
});

/* ---- info/auth ---- */
async function loadInfo() {
  const d = await api('/api/info');
  $('#llm-status').textContent = d.llm_configured
    ? `LLM: ${d.model}` : 'LLM 未配置（检索/错题本可用）';
}
async function init() {
  try {
    const me = await api('/api/me');
    setUser(me);
    await loadInfo();
  } catch (e) {
    if (!$('#auth-dialog').open) $('#llm-status').textContent = '服务不可用';
  }
}
init();

/* ---- chat ---- */
const mdLite = t => {
  let h = esc(t);
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_, l, c) => `<pre><code>${c}</code></pre>`);
  h = h.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  h = h.replace(/\*\*([^*\n]+)\*\*/g, '<b>$1</b>');
  return h;
};
function addMsg(cls, html) {
  const div = document.createElement('div');
  div.className = `msg ${cls}`;
  div.innerHTML = html;
  $('#chat-log').appendChild(div);
  div.scrollIntoView({behavior: 'smooth', block: 'end'});
  return div;
}
async function sendChat() {
  const input = $('#chat-input'), btn = $('#chat-send');
  const message = input.value.trim();
  if (!message) return;
  input.value = ''; btn.disabled = true;
  addMsg('user', esc(message));
  const waiting = addMsg('bot', '思考中…');
  try {
    const d = await api('/api/chat', {method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message, session_id: sessionId})});
    sessionId = d.session_id;
    waiting.innerHTML = mdLite(d.answer);
    if (d.events?.length) {
      const ev = document.createElement('div');
      ev.className = 'events';
      ev.textContent = d.events.join('  ·  ');
      waiting.appendChild(ev);
    }
  } catch (e) {
    waiting.innerHTML = `⚠️ ${esc(e.message)}`;
  } finally { btn.disabled = false; input.focus(); }
}
$('#chat-send').onclick = sendChat;
$('#chat-input').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.isComposing) sendChat(); });

/* ---- search ---- */
async function doSearch() {
  const q = $('#search-q').value.trim();
  if (!q) return;
  const course = $('#search-course').value;
  const box = $('#search-results');
  box.innerHTML = '<p class="muted">检索中…</p>';
  try {
    const d = await api(`/api/search?q=${encodeURIComponent(q)}&limit=20${course ? `&course=${course}` : ''}`);
    if (!d.results.length) { box.innerHTML = '<p class="muted">无匹配结果</p>'; return; }
    box.innerHTML = d.results.map(h => `
      <div class="hit">
        <div class="title" data-id="${h.section_id}">${esc(h.title)}</div>
        <div class="meta">${esc(h.source)} / ${esc(h.course)} / ${esc(h.file)} · #${h.section_id}</div>
        <div class="snippet">${esc(h.snippet).replace(/\[([^\]]+)\]/g, '<mark>$1</mark>')}</div>
      </div>`).join('');
    box.querySelectorAll('.title').forEach(t => t.onclick = () => openSection(t.dataset.id));
  } catch (e) { box.innerHTML = `<p class="muted">⚠️ ${esc(e.message)}</p>`; }
}
$('#search-btn').onclick = doSearch;
$('#search-q').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.isComposing) doSearch(); });
async function openSection(id) {
  try {
    const s = await api(`/api/section/${id}`);
    $('#section-title').textContent = s.title;
    $('#section-meta').textContent = `${s.source} / ${s.course} / ${s.file} · #${s.section_id}`;
    $('#section-view pre').textContent = s.content;
    $('#section-dialog').showModal();
  } catch (e) { alert(e.message); }
}

/* ---- mistakes ---- */
async function loadMistakes() {
  const view = $('#mi-view').value;
  const d = await api(`/api/mistakes?view=${view}`);
  const tbody = $('#mi-table tbody');
  const today = new Date().toISOString().slice(0, 10);
  if (!d.mistakes.length) { tbody.innerHTML = '<tr><td colspan="6" class="muted">（无记录）</td></tr>'; return; }
  tbody.innerHTML = d.mistakes.map(m => {
    const tags = m.tags ? m.tags.split(',').filter(Boolean).map(t => `<span class="tag">${esc(t.trim())}</span>`).join('') : '';
    const review = m.status === 'mastered' ? '<span class="mastered">已掌握 🎓</span>'
      : (m.next_review <= today ? `<span class="due">${m.next_review}（到期）</span>` : m.next_review);
    return `<tr>
      <td>${m.id}</td>
      <td>${esc(m.problem)}${m.course ? ` <span class="muted">(${m.course})</span>` : ''}</td>
      <td>${tags}</td><td class="muted">${esc(m.reason || '')}</td><td>${review}</td>
      <td class="row">
        <button class="ghost" data-act="good" data-id="${m.id}" title="记住了">✓ 会了</button>
        <button class="ghost" data-act="again" data-id="${m.id}" title="还不会">✗ 再来</button>
        <button class="ghost" data-act="rm" data-id="${m.id}">删</button>
      </td></tr>`;
  }).join('');
  tbody.querySelectorAll('button').forEach(b => b.onclick = async () => {
    const id = b.dataset.id;
    if (b.dataset.act === 'rm') {
      if (!confirm(`删除错题 #${id}？`)) return;
      await api(`/api/mistakes/${id}`, {method: 'DELETE'});
    } else {
      await api(`/api/mistakes/${id}/review`, {method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({result: b.dataset.act})});
    }
    loadMistakes();
  });
}
$('#mi-refresh').onclick = loadMistakes;
$('#mi-view').onchange = loadMistakes;
$('#mi-add-btn').onclick = () => $('#mi-dialog').showModal();
$('#mi-save').onclick = async () => {
  const problem = $('#mi-problem').value.trim();
  if (!problem) { alert('题目标识不能为空'); return; }
  await api('/api/mistakes', {method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({problem, course: $('#mi-course').value,
      tags: $('#mi-tags').value, reason: $('#mi-reason').value, note: $('#mi-note').value})});
  $('#mi-dialog').close();
  ['#mi-problem', '#mi-tags', '#mi-reason', '#mi-note'].forEach(s => $(s).value = '');
  loadMistakes();
};

/* ---- stats ---- */
async function loadStats() {
  const s = await api('/api/mistakes/stats');
  $('#stat-cards').innerHTML = [
    [s.total, '错题总数'], [s.due_today, '今日待复习'],
    [s.mastered, '已掌握'], [s.reviews_total, '累计复习'],
    [`${Math.round(s.again_rate * 100)}%`, '遗忘率'],
  ].map(([n, l]) => `<div class="stat"><div class="num">${n}</div><div class="lbl">${l}</div></div>`).join('');
  const tagRows = Object.entries(s.by_tag);
  $('#stat-tags').innerHTML = tagRows.length ? tagRows.slice(0, 12).map(([tag, v]) => {
    const pct = v.total ? Math.round(v.mastered / v.total * 100) : 0;
    return `<div style="margin-bottom:10px">
      <div class="row" style="justify-content:space-between">
        <span><span class="tag">${esc(tag)}</span> ${v.total - v.mastered} 未掌握 / ${v.total}</span>
        <span class="muted">${pct}%</span></div>
      <div class="bar"><i style="width:${pct}%"></i></div></div>`;
  }).join('') : '<p class="muted">还没有错题记录。做错题后让智能体帮你记下来吧。</p>';
  const courseRows = Object.entries(s.by_course);
  $('#stat-courses').innerHTML = courseRows.length ? courseRows.map(([c, v]) =>
    `<p>${esc(c)}：已掌握 ${v.mastered} / ${v.total}</p>`).join('') : '<p class="muted">（无）</p>';
}
</script>
</body>
</html>
